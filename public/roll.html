<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>别点我 - 开始点名</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg-primary:#f0f7f1;
  --bg-secondary:#e4f0e6;
  --bg-card:#ffffff;
  --text-primary:#1e293b;
  --text-secondary:#64748b;
  --accent:#43a047;
  --accent-hover:#388e3c;
  --accent-light:#e8f5e9;
  --accent-glow:rgba(67,160,71,0.25);
  --success:#2e7d32;
  --success-light:#c8e6c9;
  --warning:#f59e0b;
  --danger:#ef5350;
  --danger-light:#ffebee;
  --border:rgba(67,160,71,0.12);
  --shadow:rgba(67,160,71,0.08);
  --g50:#f1f8e9;--g100:#e8f5e9;--g200:#c8e6c9;
  --g400:#66bb6a;--g500:#43a047;--g600:#388e3c;--g700:#2e7d32;
  --gray-500:#6c757d;--gray-600:#555;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;
}

/* ===== 背景装饰动画 ===== */
.bg-animation{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;overflow:hidden;pointer-events:none;
}
.bg-animation .blob{
  position:absolute;border-radius:50%;filter:blur(60px);
  opacity:0.15;animation:blobFloat 25s infinite ease-in-out;
}
.bg-animation .blob:nth-child(1){
  width:380px;height:380px;background:#66bb6a;top:-5%;left:-5%;animation-delay:0s;
}
.bg-animation .blob:nth-child(2){
  width:320px;height:320px;background:#43a047;top:50%;right:-8%;animation-delay:-8s;
}
.bg-animation .blob:nth-child(3){
  width:280px;height:280px;background:#81c784;bottom:-5%;left:25%;animation-delay:-15s;
}
.bg-animation .blob:nth-child(4){
  width:240px;height:240px;background:#a5d6a7;top:30%;left:50%;animation-delay:-20s;
}
@keyframes blobFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(30px,-40px) scale(1.1)}
  50%{transform:translate(-20px,20px) scale(0.9)}
  75%{transform:translate(15px,35px) scale(1.05)}
}

/* ===== NAVBAR ===== */
.nav{
  background:#fff;height:60px;display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);position:sticky;top:0;z-index:50;
}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:34px;height:34px;border-radius:8px;object-fit:cover}
.nav-title{font-size:17px;font-weight:700;color:var(--g700)}
.nav-tabs{display:flex;gap:4px}
.nav-tab{
  padding:7px 18px;border-radius:8px;border:none;
  background:transparent;font-size:14px;font-weight:500;
  cursor:pointer;color:var(--gray-500);font-family:inherit;transition:.2s;
}
.nav-tab.active,.nav-tab:hover{background:var(--g50);color:var(--g600)}
.nav-tab.active{font-weight:700;color:var(--g700)}
.nav-right{display:flex;align-items:center;gap:12px}
.btn-sm{
  padding:7px 16px;border-radius:8px;border:1.5px solid var(--g200);
  background:#fff;color:var(--g600);font-size:13px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:.2s;
}
.btn-sm:hover{background:var(--g50)}

/* ===== 主容器 ===== */
.container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:30px 20px}

/* ===== 班级选择 ===== */
.class-bar{
  background:var(--bg-card);border-radius:16px;padding:16px 20px;
  box-shadow:0 2px 16px rgba(0,0,0,0.05);border:1.5px solid var(--border);
  display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;
}
.class-bar label{font-size:14px;font-weight:600;color:var(--g600);white-space:nowrap}
.class-select{
  flex:1;min-width:180px;padding:10px 14px;
  border:2px solid var(--g100);border-radius:10px;
  font-size:14px;background:var(--g50);outline:none;cursor:pointer;font-family:inherit;
}
.class-select:focus{border-color:var(--g400)}
.mode-btns{display:flex;gap:6px}
.mode-btn{
  padding:8px 16px;border-radius:20px;border:1.5px solid var(--g200);
  background:#fff;font-size:13px;font-weight:500;cursor:pointer;
  color:var(--gray-500);font-family:inherit;transition:.2s;
}
.mode-btn.active{background:var(--g500);color:#fff;border-color:var(--g500)}

/* ===== 点名核心展示区 ===== */
.roll-call-display{
  background:linear-gradient(135deg,var(--g600) 0%,var(--g500) 60%,#66bb6a 100%);
  border-radius:28px;padding:65px 40px 52px;text-align:center;margin-bottom:28px;
  position:relative;overflow:hidden;
  box-shadow:0 16px 48px rgba(46,125,50,0.25);
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  min-height:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.roll-call-display::before{
  content:'';position:absolute;width:360px;height:360px;border-radius:50%;
  background:rgba(255,255,255,0.05);top:-120px;right:-80px;pointer-events:none;
}
.roll-call-display::after{
  content:'';position:absolute;width:240px;height:240px;border-radius:50%;
  background:rgba(255,255,255,0.04);bottom:-60px;left:-40px;pointer-events:none;
}
.roll-call-display.active{
  box-shadow:0 8px 40px var(--accent-glow),0 0 0 4px rgba(67,160,71,0.08),0 16px 48px rgba(46,125,50,0.25);
}
.roll-call-display.result{
  box-shadow:0 8px 40px rgba(46,125,50,0.3),0 0 0 4px rgba(46,125,50,0.06);
}

.roll-label{
  font-size:13px;color:rgba(255,255,255,.7);font-weight:500;
  letter-spacing:2px;margin-bottom:12px;text-transform:uppercase;position:relative;z-index:1;
}
.display-name{
  font-size:75px;font-weight:900;color:#fff;
  min-height:105px;display:flex;align-items:center;justify-content:center;
  letter-spacing:6px;text-shadow:0 4px 24px rgba(0,0,0,0.2);
  transition:all .05s;position:relative;z-index:1;
}
.display-name.placeholder-text{
  font-size:28px;font-weight:400;opacity:.75;letter-spacing:2px;
}
.display-name.rolling{
  animation:nameShake .08s ease-in-out infinite alternate;
  filter:blur(1px);
}
.display-name.selected{
  animation:namePop .5s cubic-bezier(0.34,1.56,0.64,1);
  filter:blur(0);font-size:90px;
  text-shadow:0 0 30px rgba(255,255,255,0.5),0 0 60px rgba(255,255,255,0.2);
}

@keyframes nameShake{
  from{transform:translateX(-3px) scale(1.01)}
  to{transform:translateX(3px) scale(0.99)}
}
@keyframes namePop{
  0%{transform:scale(0.4) rotate(-5deg);opacity:.3}
  50%{transform:scale(1.25) rotate(2deg);opacity:1}
  70%{transform:scale(0.92) rotate(-1deg)}
  85%{transform:scale(1.05) rotate(0.5deg)}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}

.roll-slog{
  font-size:15px;color:rgba(255,255,255,.75);
  margin-top:14px;font-weight:500;position:relative;z-index:1;
}
.roll-remain{
  font-size:13px;color:rgba(255,255,255,.55);
  margin-top:8px;position:relative;z-index:1;
}

/* ===== 按钮区 ===== */
.control-panel{
  display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
  margin-top:32px;position:relative;z-index:1;
}
.btn-roll{
  padding:18px 56px;border-radius:50px;border:none;
  font-size:20px;font-weight:800;cursor:pointer;
  letter-spacing:2px;font-family:inherit;transition:all .25s cubic-bezier(0.4,0,0.2,1);
  background:#fff;color:var(--g600);
  box-shadow:0 6px 28px rgba(0,0,0,0.12);
}
.btn-roll:hover{transform:scale(1.04);box-shadow:0 10px 34px rgba(0,0,0,0.18)}
.btn-roll:active{transform:scale(0.98)}
.btn-roll:disabled{opacity:.55;cursor:not-allowed;transform:none!important}
.btn-roll.rolling-btn{
  background:linear-gradient(135deg,#e53935,#ef5350);
  color:#fff;box-shadow:0 6px 28px rgba(229,57,53,0.35);
}

.btn-reset{
  padding:18px 28px;border-radius:50px;border:2px solid rgba(255,255,255,.45);
  font-size:15px;font-weight:600;cursor:pointer;
  letter-spacing:1px;font-family:inherit;transition:.25s;
  background:transparent;color:#fff;
}
.btn-reset:hover{background:rgba(255,255,255,.12)}

.btn-easter{
  padding:18px 28px;border-radius:50px;border:none;
  font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .25s;
  background:linear-gradient(135deg,#ffb74d,#ff8a65,#f06292,#ba68c8,#64b5f6,#4db6ac);
  background-size:300% 300%;color:#fff;
  animation:easterGradient 6s ease infinite;
  box-shadow:0 4px 16px rgba(255,112,67,0.2);
}
.btn-easter:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(255,112,67,0.35)}
.btn-easter:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

@keyframes easterGradient{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ===== 设置行 ===== */
.options-row{
  display:flex;justify-content:center;gap:24px;margin-bottom:28px;flex-wrap:wrap;
}
.option-item{
  display:flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:13px;
}
.option-item input[type="checkbox"]{
  appearance:none;width:18px;height:18px;
  border:2px solid #cbd5e1;border-radius:6px;cursor:pointer;transition:.2s;position:relative;
}
.option-item input[type="checkbox"]:checked{
  background:var(--g500);border-color:var(--g500);
}
.option-item input[type="checkbox"]:checked::after{
  content:'✓';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);color:#fff;font-size:12px;font-weight:bold;
}
.option-item input[type="number"]{
  width:60px;padding:6px 8px;background:var(--bg-card);
  border:1.5px solid var(--border);border-radius:8px;color:var(--text-primary);
  font-size:13px;text-align:center;outline:none;transition:border-color .3s;font-family:inherit;
}
.option-item input[type="number"]:focus{border-color:var(--g400)}

/* ===== 信息卡片区 ===== */
.panels{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
}
@media(max-width:700px){.panels{grid-template-columns:1fr}}

.panel{
  background:var(--bg-card);border:1.5px solid var(--border);
  border-radius:16px;padding:18px;box-shadow:0 2px 12px var(--shadow);
}
.panel-title{
  font-size:15px;font-weight:700;color:var(--text-primary);
  margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;
}
.badge{
  background:linear-gradient(135deg,var(--g500),var(--g600));
  color:#fff;font-size:12px;padding:3px 12px;border-radius:20px;font-weight:500;
}

/* ===== 缺席区 ===== */
.absent-bar{
  background:var(--bg-card);border:1.5px solid var(--border);
  border-radius:16px;padding:16px 20px;
  box-shadow:0 2px 12px var(--shadow);margin-bottom:20px;
}
.absent-bar-title{font-size:14px;font-weight:600;color:var(--gray-600);margin-bottom:10px}
.absent-list{display:flex;flex-wrap:wrap;gap:8px}
.absent-chip{
  padding:6px 14px;border-radius:16px;border:1.5px dashed #ffcdd2;
  font-size:13px;color:var(--danger);cursor:pointer;background:#fff;transition:.2s;
}
.absent-chip:hover{background:var(--danger-light)}
.available-chip{
  padding:6px 14px;border-radius:16px;border:1.5px solid var(--g200);
  font-size:13px;color:var(--g600);cursor:pointer;background:#fff;transition:.2s;
}
.available-chip:hover{background:var(--g50);border-color:var(--g400)}

/* ===== 已点名列表 ===== */
.picked-grid{
  display:flex;flex-wrap:wrap;gap:10px;
}
.picked-chip{
  background:#fff;border:1.5px solid var(--g200);border-radius:20px;
  padding:8px 16px;font-size:14px;font-weight:500;
  color:var(--g700);box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.picked-chip.new-pick{
  background:linear-gradient(135deg,var(--g400),var(--g500));
  color:#fff;border-color:transparent;
  animation:chipIn .4s ease-out;
}
@keyframes chipIn{
  from{transform:scale(0.6);opacity:0}
  to{transform:scale(1);opacity:1}
}
.empty-hint{text-align:center;padding:24px;color:var(--text-secondary);font-size:13px;opacity:.6}

/* ===== 记录列表 ===== */
.history-list{list-style:none;max-height:360px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-track{background:transparent}
.history-list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.history-list li{
  padding:10px 14px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);font-size:14px;
}
.history-list li:last-child{border-bottom:none}
.history-list li .history-name{color:var(--g600);font-weight:600}
.history-list li .history-time{color:var(--text-secondary);font-size:12px}
.history-list li .history-index{
  background:linear-gradient(135deg,var(--g500),var(--g600));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-weight:700;font-size:13px;min-width:30px;
}

/* ===== 彩带全屏粒子 ===== */
.confetti-container{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  pointer-events:none;overflow:hidden;z-index:999;
}
.confetti-piece{
  position:absolute;border-radius:2px;
  animation:confettiFall 2.5s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  70%{opacity:1}
  100%{transform:translateY(100vh) rotate(1440deg) scale(0.4);opacity:0}
}
@keyframes confettiSway{
  0%,100%{margin-left:0}
  25%{margin-left:30px}
  75%{margin-left:-30px}
}

/* ===== 光环爆发 ===== */
.ring-burst{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:20px;height:20px;border:3px solid rgba(255,255,255,.6);
  border-radius:50%;animation:ringBurst .8s ease-out forwards;
  pointer-events:none;z-index:2;
}
@keyframes ringBurst{
  0%{width:20px;height:20px;opacity:1;border-width:4px}
  100%{width:400px;height:400px;opacity:0;border-width:1px}
}

/* ===== 彩蛋弹窗 ===== */
.easter-modal-overlay{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  animation:modalFadeIn .3s ease-out;perspective:1200px;
}
@keyframes modalFadeIn{
  from{opacity:0}to{opacity:1}
}
.easter-modal{
  background:#fff;border-radius:24px;padding:40px 36px 32px;
  max-width:420px;width:90%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  animation:modalCardFlip 1.2s ease-out forwards;
  position:relative;overflow:hidden;
}
@keyframes modalCardFlip{
  0%{transform:rotateY(180deg) scale(0.7);opacity:0}
  30%{opacity:1}
  100%{transform:rotateY(0deg) scale(1)}
}
.easter-modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,#4db6ac,#81c784,#aed581,#fff176,#ffb74d,#ff8a65);
  background-size:200% 100%;animation:easterGradient 4s ease infinite;
}
.easter-modal .easter-icon{font-size:3rem;margin-bottom:12px}
.easter-modal .easter-title{font-size:1.3rem;font-weight:700;color:#1e293b;margin-bottom:8px}
.easter-modal .easter-person{font-size:1.1rem;color:var(--g500);font-weight:600;margin-bottom:12px}
.easter-modal .easter-content{
  font-size:1.1rem;color:#334155;line-height:1.7;
  padding:16px 20px;background:#f8fafc;border-radius:12px;
  margin-bottom:20px;border:1px solid rgba(67,160,71,0.1);
}
.easter-modal .easter-actions{display:flex;gap:12px;justify-content:center}
.easter-modal .easter-btn{
  padding:10px 28px;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;
}
.easter-modal .easter-btn-close{background:#f1f5f9;color:#64748b}
.easter-modal .easter-btn-close:hover{background:#e2e8f0}
.easter-modal .easter-btn-again{
  background:linear-gradient(135deg,var(--g400),var(--g500));color:#fff;
}
.easter-modal .easter-btn-again:hover{
  background:linear-gradient(135deg,var(--g500),var(--g600));transform:translateY(-1px);
}

/* ===== Toast ===== */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;
  padding:12px 28px;border-radius:12px;font-size:14px;font-weight:500;
  color:#fff;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;
}
.toast.show{opacity:1}
.toast-success{background:var(--g500)}
.toast-error{background:var(--danger)}
.toast-info{background:#607d8b}

/* ===== LOADING ===== */
.loading-mask{
  position:fixed;inset:0;background:rgba(255,255,255,.75);
  z-index:998;display:flex;align-items:center;justify-content:center;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--g200);
  border-top-color:var(--g500);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 响应式 ===== */
@media(max-width:600px){
  .container{padding:20px 15px}
  .roll-name{font-size:48px;min-height:72px;letter-spacing:3px}
  .display-name{font-size:48px;min-height:72px;letter-spacing:3px}
  .display-name.selected{font-size:58px}
  .btn-roll{padding:14px 40px;font-size:17px}
  .btn-reset{padding:14px 24px;font-size:14px}
  .btn-easter{padding:14px 24px;font-size:14px}
  .class-bar{gap:8px}
  .mode-btns{flex-wrap:wrap}
  .control-panel{gap:10px}
  .nav{padding:0 16px}
  .nav-tabs{display:none}
  .roll-call-display{padding:40px 24px 36px;min-height:240px}
}
</style>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-animation">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<!-- 加载遮罩 -->
<div class="loading-mask" id="loadingMask"><div class="spinner"></div></div>

<!-- 彩带容器 -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 导航 -->
<nav class="nav">
  <div class="nav-brand">
    <img src="logo.png" alt="" class="nav-logo" onerror="this.style.display='none'">
    <span class="nav-title">别点我</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="location.href='dashboard.html'">班级管理</button>
    <button class="nav-tab active">开始点名</button>
  </div>
  <div class="nav-right">
    <span style="font-size:13px;color:var(--gray-500)" id="navUser"></span>
    <button class="btn-sm" onclick="doLogout()">退出</button>
  </div>
</nav>

<div class="container">

  <!-- 班级选择 & 模式 -->
  <div class="class-bar">
    <label>选择班级</label>
    <select class="class-select" id="classSelect" onchange="onClassChange()">
      <option value="">-- 请选择班级 --</option>
    </select>
    <div class="mode-btns">
      <button class="mode-btn active" id="modeNoRepeat" onclick="setMode('norepeat')">不重复</button>
      <button class="mode-btn" id="modeRepeat" onclick="setMode('repeat')">可重复</button>
    </div>
  </div>

  <!-- 点名舞台 -->
  <div class="roll-call-display" id="displayArea">
    <div class="roll-label">RANDOM ROLL</div>
    <div class="display-name placeholder-text" id="displayName">大喊别点我！</div>
    <div class="roll-slog">下一个就是你 👀</div>
    <div class="roll-remain" id="rollRemain"></div>
    <div class="control-panel">
      <button class="btn-roll" id="btnRoll" onclick="handleRoll()" disabled>选择班级后开始</button>
      <button class="btn-reset" onclick="resetRound()">↺ 重置本轮</button>
      <button class="btn-easter" id="easterBtn" onclick="triggerEasterEgg()" disabled>🎲 彩蛋</button>
    </div>
  </div>

  <!-- 设置选项 -->
  <div class="options-row">
    <label class="option-item">
      <input type="checkbox" id="soundEffect" checked>
      <span>音效提示</span>
    </label>
    <label class="option-item">
      <span>点名时长(秒)</span>
      <input type="number" id="rollDuration" value="4" min="1" max="10">
    </label>
  </div>

  <!-- 双栏面板 -->
  <div class="panels">
    <!-- 缺席管理 -->
    <div class="panel" id="absentPanel" style="display:none">
      <div class="panel-title">
        <span>标记缺席（点击切换）</span>
        <span class="badge" id="absentCount">0人</span>
      </div>
      <div class="absent-list" id="absentList"></div>
    </div>

    <!-- 本轮已点名 -->
    <div class="panel" id="pickedPanel" style="display:none">
      <div class="panel-title">
        <span>本轮已点名</span>
        <span class="badge" id="pickedCount">0人</span>
      </div>
      <div class="picked-grid" id="pickedGrid"></div>
      <div class="empty-hint" id="pickedEmpty">选择一个班级开始点名</div>
    </div>
  </div>

</div>

<script>
// ===== 全局状态 =====
let currentUser = null;
let allStudents = [];
let absentIds = new Set();
let pickedIds = [];
let isRolling = false;
let rollTimer = null;
let noRepeatMode = true;
let lastSelectedName = '';
let pickHistory = [];

// ===== 音效系统 (Web Audio API) =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTickSound() {
  if (!document.getElementById('soundEffect').checked) return;
  const ctx = getAudioCtx();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(1000 + Math.random() * 300, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(700, ctx.currentTime + 0.05);
  g.gain.setValueAtTime(0.1, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  o.start(ctx.currentTime);o.stop(ctx.currentTime + 0.08);
}

function playResultSound() {
  if (!document.getElementById('soundEffect').checked) return;
  const ctx = getAudioCtx();const t = ctx.currentTime;
  [523, 659, 784, 1047, 1319].forEach((f,i) => {
    const o = ctx.createOscillator();const g = ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type = 'sine';
    const s = t + i * 0.1;
    g.gain.setValueAtTime(0,s);
    g.gain.linearRampToValueAtTime(0.13,s+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,s+0.35);
    o.frequency.value = f;o.start(s);o.stop(s+0.35);
  });
  [262,330,392].forEach((f,i) => {
    const o = ctx.createOscillator();const g = ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type = 'sine';
    const s = t + 0.3;
    g.gain.setValueAtTime(0,s);
    g.gain.linearRampToValueAtTime(0.06,s+0.1);
    g.gain.exponentialRampToValueAtTime(0.001,s+1.2);
    o.frequency.value = f;o.start(s);o.stop(s+1.2);
  });
}

function playEasterSound(type) {
  if (!document.getElementById('soundEffect').checked) return;
  const ctx = getAudioCtx();const t = ctx.currentTime;
  if (type === 'lucky') {
    [659,784,988,1175,1319].forEach((f,i) => {
      const o = ctx.createOscillator();const g = ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type = 'sine';
      const s = t + i*0.09;
      g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.1,s+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,s+0.3);
      o.frequency.value = f;o.start(s);o.stop(s+0.3);
    });
  } else {
    const o = ctx.createOscillator();const g = ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type = 'sawtooth';
    o.frequency.setValueAtTime(600,t);
    o.frequency.exponentialRampToValueAtTime(200,t+0.5);
    g.gain.setValueAtTime(0.08,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
    o.start(t);o.stop(t+0.6);
  }
}

// ===== 视觉效果 =====
function launchConfetti() {
  const c = document.getElementById('confettiContainer');
  c.innerHTML = '';
  const colors = ['#43a047','#66bb6a','#81c784','#a5d6a7','#ffb74d','#f06292','#64b5f6','#4db6ac','#fff176'];
  for (let i = 0; i < 180; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const cl = colors[Math.floor(Math.random() * colors.length)];
    const sz = 10 + Math.random() * 16;
    p.style.cssText = `
      left:${Math.random()*100}%;top:${-8 - Math.random()*15}%;
      width:${sz}px;height:${Math.random()>.3 ? sz : sz*3 + Math.random()*20}px;
      background:${cl};border-radius:${Math.random()>.5?'50%':'3px'};
      animation:confettiFall ${2+Math.random()*2.5}s cubic-bezier(0.25,0.46,0.45,0.94) ${Math.random()*.8}s forwards,
                confettiSway ${1.5+Math.random()*1.5}s ease-in-out ${Math.random()*.8}s infinite;
      transform:rotate(${Math.random()*360}deg);opacity:.95;
    `;
    c.appendChild(p);
  }
  setTimeout(() => { c.innerHTML = ''; }, 6000);
}

function launchRingBurst() {
  const area = document.getElementById('displayArea');
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'ring-burst';
      r.style.animationDelay = `${i*0.15}s`;
      area.appendChild(r);
      setTimeout(() => r.remove(), 1000);
    }, i * 150);
  }
}

// ===== Toast =====
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + type + ' show';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

// ===== 初始化 =====
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = 'index.html'; return; }
  currentUser = session.user;
  document.getElementById('navUser').textContent = currentUser.email;
  await loadClassOptions();
  document.getElementById('loadingMask').style.display = 'none';
})();

async function loadClassOptions() {
  const { data } = await sb.from('classes')
    .select('id, name').eq('user_id', currentUser.id)
    .order('created_at', { ascending: true });
  const sel = document.getElementById('classSelect');
  (data || []).forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;o.textContent = c.name;
    sel.appendChild(o);
  });
}

async function onClassChange() {
  const classId = document.getElementById('classSelect').value;
  if (!classId) {
    allStudents = [];absentIds = new Set();pickedIds = [];pickHistory = [];
    lastSelectedName = '';
    document.getElementById('btnRoll').disabled = true;
    document.getElementById('btnRoll').textContent = '选择班级后开始';
    document.getElementById('displayName').innerHTML = '大喊别点我！';
    document.getElementById('displayName').className = 'display-name placeholder-text';
    document.getElementById('rollRemain').textContent = '';
    document.getElementById('displayArea').className = 'roll-call-display';
    document.getElementById('pickedPanel').style.display = 'none';
    document.getElementById('absentPanel').style.display = 'none';
    document.getElementById('easterBtn').disabled = true;
    return;
  }

  const { data } = await sb.from('students')
    .select('id, name').eq('class_id', classId)
    .order('created_at', { ascending: true });

  allStudents = data || [];
  absentIds = new Set();
  pickedIds = [];
  pickHistory = [];
  lastSelectedName = '';

  if (allStudents.length === 0) {
    showToast('该班级暂无学生，请先去添加', 'error');
    document.getElementById('btnRoll').disabled = true;
    document.getElementById('btnRoll').textContent = '暂无学生';
    return;
  }

  document.getElementById('btnRoll').disabled = false;
  document.getElementById('btnRoll').textContent = '点 名';
  document.getElementById('displayName').innerHTML = '准备好了吗？';
  document.getElementById('displayName').className = 'display-name placeholder-text';
  document.getElementById('rollRemain').textContent = '';
  document.getElementById('displayArea').className = 'roll-call-display';
  document.getElementById('absentPanel').style.display = 'block';
  document.getElementById('pickedPanel').style.display = 'block';
  document.getElementById('easterBtn').disabled = true;

  renderAbsentBar();
  renderPickedPanel();
  updateRemainCount();
}

// ===== 模式 =====
function setMode(m) {
  noRepeatMode = m === 'norepeat';
  document.getElementById('modeNoRepeat').classList.toggle('active', noRepeatMode);
  document.getElementById('modeRepeat').classList.toggle('active', !noRepeatMode);
  updateRemainCount();
}

// ===== 点名核心 =====
function getAvailable() {
  return allStudents.filter(s => {
    if (absentIds.has(s.id)) return false;
    if (noRepeatMode && pickedIds.includes(s.id)) return false;
    return true;
  });
}

function updateRemainCount() {
  const av = getAvailable();
  const total = allStudents.filter(s => !absentIds.has(s.id)).length;
  const el = document.getElementById('rollRemain');
  if (allStudents.length === 0) { el.textContent = ''; return; }
  el.textContent = noRepeatMode
    ? `剩余可点：${av.length} / ${total} 人`
    : `参与点名：${total} 人`;
}

function handleRoll() {
  if (isRolling) return;
  const available = getAvailable();

  if (available.length === 0) {
    showToast(noRepeatMode ? '所有人都已点过！点「重置本轮」重新开始' : '没有可点名的学生', 'info');
    return;
  }

  isRolling = true;
  const nameEl = document.getElementById('displayName');
  const area = document.getElementById('displayArea');
  const btn = document.getElementById('btnRoll');

  nameEl.className = 'display-name rolling';
  area.classList.add('active');
  area.classList.remove('result');
  btn.disabled = true;
  btn.textContent = '点名中...';
  btn.classList.add('rolling-btn');

  const duration = (parseInt(document.getElementById('rollDuration').value) || 4) * 1000;
  const startTime = Date.now();

  function rollStep() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const currentInterval = 40 + progress * progress * 220;

    const r = available[Math.floor(Math.random() * available.length)];
    nameEl.textContent = r.name;
    playTickSound();

    if (elapsed >= duration) {
      finishRoll(available);
      return;
    }
    rollTimer = setTimeout(rollStep, currentInterval);
  }

  rollStep();
}

function finishRoll(available) {
  rollTimer = null;
  const nameEl = document.getElementById('displayName');
  const area = document.getElementById('displayArea');
  const btn = document.getElementById('btnRoll');

  const picked = available[Math.floor(Math.random() * available.length)];

  nameEl.textContent = picked.name;
  nameEl.className = 'display-name selected';
  area.classList.remove('active');
  area.classList.add('result');

  isRolling = false;
  btn.disabled = false;
  btn.textContent = '再点一个';
  btn.classList.remove('rolling-btn');

  // 特效 & 音效
  launchConfetti();
  launchRingBurst();
  playResultSound();

  // 记录
  lastSelectedName = picked.name;
  document.getElementById('easterBtn').disabled = false;
  pickedIds.push(picked.id);
  pickHistory.push({
    name: picked.name,
    time: new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' })
  });
  saveRecord(picked);
  renderPickedPanel(picked.id);
  updateRemainCount();
}

async function saveRecord(student) {
  const classId = document.getElementById('classSelect').value;
  await sb.from('roll_records').insert({
    class_id: classId,
    student_id: student.id,
    student_name: student.name,
    user_id: currentUser.id,
    rolled_at: new Date().toISOString()
  });
}

function renderPickedPanel(newId) {
  const panel = document.getElementById('pickedPanel');
  const grid = document.getElementById('pickedGrid');
  const countEl = document.getElementById('pickedCount');
  const empty = document.getElementById('pickedEmpty');

  panel.style.display = 'block';
  if (pickedIds.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    countEl.textContent = '0人';
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = pickedIds.map(id => {
    const s = allStudents.find(x => x.id === id);
    const isNew = id === newId;
    return `<div class="picked-chip${isNew ? ' new-pick' : ''}">${s ? esc(s.name) : '?'}</div>`;
  }).join('');
  countEl.textContent = `${pickedIds.length}人`;
}

function resetRound() {
  pickedIds = [];pickHistory = [];
  lastSelectedName = '';
  isRolling = false;
  if (rollTimer) clearTimeout(rollTimer);

  const nameEl = document.getElementById('displayName');
  nameEl.className = 'display-name placeholder-text';
  nameEl.textContent = '准备好了吗？';

  document.getElementById('btnRoll').disabled = false;
  document.getElementById('btnRoll').textContent = '点 名';
  document.getElementById('btnRoll').classList.remove('rolling-btn');
  document.getElementById('displayArea').className = 'roll-call-display';
  document.getElementById('easterBtn').disabled = true;

  renderPickedPanel(null);
  updateRemainCount();
  showToast('本轮已重置');
}

// ===== 缺席 =====
function renderAbsentBar() {
  const list = document.getElementById('absentList');
  if (allStudents.length === 0) { list.innerHTML = '';return; }
  list.innerHTML = allStudents.map(s => {
    const isAbs = absentIds.has(s.id);
    return `<div class="${isAbs ? 'absent-chip' : 'available-chip'}"
      onclick="toggleAbsent('${s.id}')" title="${isAbs ? '点击恢复' : '点击标记缺席'}">
      ${esc(s.name)}${isAbs ? ' ✗' : ''}
    </div>`;
  }).join('');
  document.getElementById('absentCount').textContent = `${absentIds.size}人`;
}

function toggleAbsent(id) {
  if (absentIds.has(id)) {
    absentIds.delete(id);
  } else {
    absentIds.add(id);
    pickedIds = pickedIds.filter(p => p !== id);
    pickHistory = pickHistory.filter(h => allStudents.find(s => s.id === id && s.name === h.name) === undefined);
    renderPickedPanel(null);
  }
  renderAbsentBar();
  updateRemainCount();
}

// ===== 彩蛋 =====
const easterEggItems = [
  { text: '说一句「老师真帅」，不用回答问题！', icon: '😎', type: 'lucky' },
  { text: '如果你是女生，不用回答！', icon: '👧', type: 'lucky' },
  { text: '如果你是男生，不用回答！', icon: '👦', type: 'lucky' },
  { text: '运气爆棚，必须回答这个问题！', icon: '💥', type: 'unlucky' }
];

function triggerEasterEgg() {
  if (!lastSelectedName) { showToast('请先点名再开彩蛋哦~', 'info'); return; }
  const item = easterEggItems[Math.floor(Math.random() * easterEggItems.length)];
  showEasterModal(item);
}

function showEasterModal(item) {
  const exist = document.getElementById('easterModalOverlay');
  if (exist) exist.remove();

  const overlay = document.createElement('div');
  overlay.className = 'easter-modal-overlay';
  overlay.id = 'easterModalOverlay';
  overlay.onclick = function(e) { if (e.target === overlay) closeEasterModal(); };

  const typeColor = item.type === 'lucky' ? '#2e7d32' : '#ef5350';
  const typeLabel = item.type === 'lucky' ? '幸运' : '挑战';

  overlay.innerHTML = `
    <div class="easter-modal">
      <div class="easter-icon">${item.icon}</div>
      <div class="easter-title" style="color:${typeColor}">${typeLabel}彩蛋</div>
      <div class="easter-person">⭐${lastSelectedName}⭐</div>
      <div class="easter-content">${item.text}</div>
      <div class="easter-actions">
        <button class="easter-btn easter-btn-close" onclick="closeEasterModal()">知道了</button>
        <button class="easter-btn easter-btn-again" onclick="rerollEasterEgg()">再抽一次</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  playEasterSound(item.type);
}

function closeEasterModal() {
  const o = document.getElementById('easterModalOverlay');
  if (o) o.remove();
}
function rerollEasterEgg() {
  const item = easterEggItems[Math.floor(Math.random() * easterEggItems.length)];
  closeEasterModal();
  setTimeout(() => showEasterModal(item), 200);
}

// ===== 登出 =====
async function doLogout() {
  await sb.auth.signOut();
  location.href = 'index.html';
}

// ===== 工具函数 =====
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;return d.innerHTML;
}

// 空格/回车触发点名
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    const btn = document.getElementById('btnRoll');
    if (!btn.disabled && !isRolling) { e.preventDefault();handleRoll(); }
  }
});
</script>
</body>
</html>
