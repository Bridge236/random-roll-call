<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机点名器</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f0f4ff;
            --bg-secondary: #e8eeff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: #e0e7ff;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(99, 102, 241, 0.12);
            --shadow: rgba(99, 102, 241, 0.08);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-animation .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.18;
            animation: blobFloat 25s infinite ease-in-out;
        }

        .bg-animation .blob:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #818cf8;
            top: -5%;
            left: -5%;
            animation-delay: 0s;
        }

        .bg-animation .blob:nth-child(2) {
            width: 350px;
            height: 350px;
            background: #34d399;
            top: 50%;
            right: -8%;
            animation-delay: -8s;
        }

        .bg-animation .blob:nth-child(3) {
            width: 300px;
            height: 300px;
            background: #fbbf24;
            bottom: -5%;
            left: 25%;
            animation-delay: -15s;
        }

        .bg-animation .blob:nth-child(4) {
            width: 250px;
            height: 250px;
            background: #f472b6;
            top: 30%;
            left: 50%;
            animation-delay: -20s;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(15px, 35px) scale(1.05); }
        }

        /* 主布局 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .header h1 span {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* 班级选择栏 */
        .class-bar {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 14px 20px;
            box-shadow: 0 2px 12px var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .class-bar label {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }

        .class-select {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            border: 2px solid var(--accent-light);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg-secondary);
            outline: none;
            cursor: pointer;
            font-family: inherit;
            color: var(--text-primary);
            transition: border-color 0.3s;
        }

        .class-select:focus {
            border-color: var(--accent);
        }

        .user-info {
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .btn-logout {
            padding: 7px 16px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: #fef2f2;
        }

        .btn-dashboard {
            padding: 7px 16px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-dashboard:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        /* 主显示区 - 点名展示 */
        .roll-call-display {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 28px;
            padding: 70px 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px var(--shadow);
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .roll-call-display.active {
            border-color: var(--accent);
            box-shadow: 0 8px 40px var(--accent-glow), 0 0 0 4px rgba(99, 102, 241, 0.06);
        }

        .roll-call-display.result {
            border-color: var(--success);
            box-shadow: 0 8px 40px rgba(16, 185, 129, 0.2), 0 0 0 4px rgba(16, 185, 129, 0.06);
        }

        .roll-call-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .roll-call-display.active::before {
            opacity: 1;
        }

        .roll-call-display.result::before {
            opacity: 0.6;
            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.15), transparent 70%);
        }

        .display-name {
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--text-primary);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s, font-size 0.3s;
            position: relative;
            z-index: 1;
        }

        .display-name.rolling {
            animation: nameRoll 0.12s infinite;
            color: var(--accent);
            transition: none;
        }

        .display-name.selected {
            font-size: 5.5rem;
            color: var(--success);
            animation: nameSelected 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), nameGlow 1.2s ease-in-out 0.8s infinite;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4), 0 0 40px rgba(16, 185, 129, 0.2);
            transition: none;
        }

        @keyframes nameRoll {
            0% { transform: translateY(-3px) scale(1.02); opacity: 0.6; }
            50% { transform: translateY(3px) scale(0.98); opacity: 1; }
            100% { transform: translateY(-3px) scale(1.02); opacity: 0.6; }
        }

        @keyframes nameSelected {
            0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            40% { transform: scale(1.3) rotate(3deg); opacity: 1; }
            60% { transform: scale(0.95) rotate(-1deg); }
            80% { transform: scale(1.08) rotate(0.5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes nameGlow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(16, 185, 129, 0.4), 0 0 40px rgba(16, 185, 129, 0.2);
                opacity: 1;
            }
            50% {
                text-shadow: 0 0 40px rgba(16, 185, 129, 0.8), 0 0 80px rgba(16, 185, 129, 0.5), 0 0 120px rgba(16, 185, 129, 0.2);
                opacity: 0.7;
            }
        }

        .display-placeholder {
            color: var(--text-secondary);
            font-size: 1.5rem;
            font-weight: 400;
        }

        .display-count {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: auto;
            padding-top: 20px;
            padding-bottom: calc(1.5em + 10px);
            position: relative;
            z-index: 1;
        }

        /* 彩带/粒子容器 - 全屏 */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            overflow: hidden;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            border-radius: 2px;
            animation: confettiFall 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(1440deg) scale(0.4);
                opacity: 0;
            }
        }

        @keyframes confettiSway {
            0%, 100% { margin-left: 0; }
            25% { margin-left: 30px; }
            75% { margin-left: -30px; }
        }

        /* 光环爆发 */
        .ring-burst {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 3px solid var(--success);
            border-radius: 50%;
            animation: ringBurst 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes ringBurst {
            0% { width: 20px; height: 20px; opacity: 1; border-width: 4px; }
            100% { width: 400px; height: 400px; opacity: 0; border-width: 1px; }
        }

        /* 操控按钮区 */
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary.rolling-btn {
            background: linear-gradient(135deg, #10b981, #34d399);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            background: var(--accent-light);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--bg-card);
            color: var(--danger);
            border: 1.5px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .btn-danger:hover {
            background: #fef2f2;
            border-color: var(--danger);
        }

        .btn-easter {
            background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8, #34d399, #fbbf24, #f472b6);
            background-size: 300% 300%;
            color: white;
            border: none;
            box-shadow: 0 4px 16px rgba(168, 85, 247, 0.2);
            animation: easterGradient 6s ease infinite;
        }

        @keyframes easterGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-easter:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.35);
        }

        .btn-easter:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 彩蛋弹窗 */
        .easter-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: modalFadeIn 0.3s ease-out;
            perspective: 1200px;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .easter-modal {
            background: white;
            border-radius: 24px;
            padding: 40px 36px 32px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: modalCardFlip 1.2s ease-out forwards;
            position: relative;
            overflow: hidden;
            transform-origin: center center;
        }

        @keyframes modalCardFlip {
            0% {
                transform: rotateY(180deg) scale(0.7);
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: rotateY(0deg) scale(1);
            }
        }

        .easter-modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #c084fc, #818cf8, #38bdf8, #34d399, #fbbf24, #f472b6);
            background-size: 200% 100%;
            animation: easterGradient 4s ease infinite;
        }

        .easter-modal .easter-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .easter-modal .easter-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .easter-modal .easter-person {
            font-size: 1.1rem;
            color: #6366f1;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .easter-modal .easter-content {
            font-size: 1.15rem;
            color: #334155;
            line-height: 1.7;
            padding: 16px 20px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .easter-modal .easter-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .easter-modal .easter-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .easter-modal .easter-btn-close {
            background: #f1f5f9;
            color: #64748b;
        }

        .easter-modal .easter-btn-close:hover {
            background: #e2e8f0;
        }

        .easter-modal .easter-btn-again {
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            color: white;
        }

        .easter-modal .easter-btn-again:hover {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 设置选项 */
        .options-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .option-item input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .option-item input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .option-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .option-item input[type="number"] {
            width: 60px;
            padding: 6px 8px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .option-item input[type="number"]:focus {
            border-color: var(--accent);
        }

        /* 双栏布局 */
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .panels {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title .badge {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 0.75rem;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* 名单管理 - 学生列表（含缺席标记） */
        .student-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .student-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            user-select: none;
        }

        .student-chip:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .student-chip.absent {
            border-color: rgba(239, 68, 68, 0.4);
            border-style: dashed;
            color: var(--danger);
            opacity: 0.65;
            background: #fef2f2;
        }

        .student-chip.called {
            opacity: 0.4;
            text-decoration: line-through;
            cursor: default;
        }

        .empty-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            padding: 20px;
            opacity: 0.6;
        }

        /* 历史记录 */
        .history-list {
            list-style: none;
            max-height: 600px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .history-list li {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .history-list li:last-child {
            border-bottom: none;
        }

        .history-list li .history-name {
            color: var(--success);
            font-weight: 600;
        }

        .history-list li .history-time {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .history-list li .history-index {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 0.85rem;
            min-width: 30px;
        }

        /* 预设名单 */
        .preset-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        /* Toast 通知 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s forwards;
            max-width: 300px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .toast.success {
            background: var(--success);
            color: white;
        }

        .toast.error {
            background: var(--danger);
            color: white;
        }

        .toast.info {
            background: var(--accent);
            color: white;
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container { padding: 20px 15px; }
            .header h1 { font-size: 2rem; }
            .display-name { font-size: 2.5rem; min-height: 50px; }
            .roll-call-display { padding: 30px 20px; }
            .btn { padding: 12px 24px; font-size: 0.9rem; }
            .control-panel { gap: 10px; }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-animation">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 全屏撒花容器 -->
    <div class="confetti-container" id="confettiContainer"></div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>随机<span>点名</span>器</h1>
            <p>responsibility，雷老师呀别点me!</p>
        </header>

        <!-- 班级选择栏 -->
        <div class="class-bar">
            <label>📋 选择班级</label>
            <select class="class-select" id="classSelect" onchange="onClassChange()">
                <option value="">-- 请选择班级 --</option>
            </select>
            <span class="user-info" id="navUser"></span>
            <button class="btn-dashboard" onclick="location.href='dashboard.html'">班级管理</button>
            <button class="btn-logout" onclick="doLogout()">退出</button>
        </div>

        <!-- 主展示区 -->
        <section class="roll-call-display" id="displayArea">
            <div class="display-name" id="displayName">
                <span class="display-placeholder">请先选择班级</span>
            </div>
            <div class="display-count" id="displayCount">请选择班级后开始点名</div>
        </section>

        <!-- 操控按钮 -->
        <div class="control-panel">
            <button class="btn btn-primary" id="startBtn" onclick="startRollCall()" disabled>选择班级后开始</button>
            <button class="btn btn-secondary" id="resetBtn" onclick="resetCalledStatus()">重置点名</button>
            <button class="btn btn-danger" id="clearAllBtn" onclick="resetCalledStatus()">清空本轮</button>
            <button class="btn btn-easter" id="easterBtn" onclick="triggerEasterEgg()" disabled>彩蛋</button>
        </div>

        <!-- 设置选项 -->
        <div class="options-row">
            <label class="option-item">
                <input type="checkbox" id="noRepeat" checked>
                <span>不重复点名</span>
            </label>
            <label class="option-item">
                <input type="checkbox" id="soundEffect" checked>
                <span>音效提示</span>
            </label>
            <label class="option-item">
                <span>点名时长(秒)</span>
                <input type="number" id="rollDuration" value="5" min="1" max="10">
            </label>
        </div>

        <!-- 双栏面板 -->
        <div class="panels">
            <!-- 名单管理 -->
            <div class="panel">
                <div class="panel-title">
                    <span>名单管理</span>
                    <span class="badge" id="nameCountBadge">0人</span>
                </div>
                <div class="preset-row">
                    <span style="font-size:0.8rem;color:var(--text-secondary);padding:6px 0;">点击学生可标记缺席（不影响后台数据）</span>
                </div>
                <div class="student-chip-row" id="studentChipRow"></div>
                <div class="empty-hint" id="emptyHint">请先选择班级</div>
            </div>

            <!-- 点名历史 -->
            <div class="panel">
                <div class="panel-title">
                    <span>点名历史</span>
                    <span class="badge" id="historyCountBadge">0次</span>
                </div>
                <ul class="history-list" id="historyList"></ul>
                <div class="empty-hint" id="historyEmptyHint">暂无点名记录</div>
            </div>
        </div>
    </div>

    <script>
        // ===== 全局状态 =====
        let currentUser = null;
        let names = [];           // 当前班级所有学生名字
        let studentIds = [];      // 对应的学生 ID
        let absentIds = new Set(); // 本地缺席标记（不影响后台）
        let calledNames = new Set();
        let history = [];
        let isRolling = false;
        let rollInterval = null;
        let lastSelectedName = '';

        // ===== 音效（使用 Web Audio API 生成更丰富的声音） =====
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        // 滚动时的滴答声 - 清脆的木鱼/转盘声
        function playTickSound() {
            if (!document.getElementById('soundEffect').checked) return;
            const ctx = getAudioCtx();

            // 主音：短促的"叮"
            const osc1 = ctx.createOscillator();
            const gain1 = ctx.createGain();
            osc1.connect(gain1);
            gain1.connect(ctx.destination);
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(1200 + Math.random() * 200, ctx.currentTime);
            osc1.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);
            gain1.gain.setValueAtTime(0.12, ctx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
            osc1.start(ctx.currentTime);
            osc1.stop(ctx.currentTime + 0.08);

            // 辅助音：增加质感的高频泛音
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.type = 'sine';
            osc2.frequency.value = 2400 + Math.random() * 400;
            gain2.gain.setValueAtTime(0.04, ctx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
            osc2.start(ctx.currentTime);
            osc2.stop(ctx.currentTime + 0.04);
        }

        // 结果揭晓音 - 胜利号角 + 欢快上升音阶
        function playResultSound() {
            if (!document.getElementById('soundEffect').checked) return;
            const ctx = getAudioCtx();
            const now = ctx.currentTime;

            // 上升五音阶（C5-E5-G5-C6-E6）
            const melody = [523.25, 659.25, 783.99, 1046.50, 1318.51];
            melody.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const t = now + i * 0.1;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.15, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                osc.start(t);
                osc.stop(t + 0.35);
            });

            // 和弦衬底（C major chord with soft pad）
            const padNotes = [261.63, 329.63, 392.00];
            padNotes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const t = now + 0.3;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.08, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
                osc.start(t);
                osc.stop(t + 1.2);
            });

            // 闪烁装饰音
            const sparkleNotes = [2093, 2637, 3136];
            sparkleNotes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const t = now + 0.5 + i * 0.08;
                gain.gain.setValueAtTime(0.06, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                osc.start(t);
                osc.stop(t + 0.2);
            });
        }

        // 彩蛋弹窗音效
        function playEasterEggSound(type) {
            if (!document.getElementById('soundEffect').checked) return;
            const ctx = getAudioCtx();
            const now = ctx.currentTime;

            if (type === 'lucky') {
                // 幸运彩蛋：欢快上升琶音 + 闪亮音
                const notes = [659.25, 783.99, 987.77, 1174.66, 1318.51];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const t = now + i * 0.09;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.12, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                    osc.start(t);
                    osc.stop(t + 0.3);
                });
                // 闪亮装饰
                const sparkle = [2093, 2637];
                sparkle.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const t = now + 0.5 + i * 0.1;
                    gain.gain.setValueAtTime(0.06, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                    osc.start(t);
                    osc.stop(t + 0.25);
                });
            } else {
                // 挑战彩蛋：戏剧性下降音 + 紧张鼓点
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.5);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
                // 紧张鼓点
                const drumTimes = [0.15, 0.3, 0.45];
                drumTimes.forEach((d, i) => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(150, now + d);
                    osc2.frequency.exponentialRampToValueAtTime(50, now + d + 0.1);
                    gain2.gain.setValueAtTime(0.12, now + d);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + d + 0.15);
                    osc2.start(now + d);
                    osc2.stop(now + d + 0.15);
                });
            }
        }

        // ===== 彩带粒子效果（全屏增强版） =====
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#6366f1', '#8b5cf6', '#a855f7', '#10b981', '#34d399',
                            '#f59e0b', '#fbbf24', '#f472b6', '#ec4899', '#3b82f6',
                            '#06b6d4', '#f43f5e', '#8b5cf6', '#22d3ee'];

            for (let i = 0; i < 200; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                const color = colors[Math.floor(Math.random() * colors.length)];
                const isLong = Math.random() < 0.3; // 30% 概率长条彩带
                const size = isLong ? (6 + Math.random() * 8) : (12 + Math.random() * 18);
                const height = isLong ? (size * 3 + Math.random() * 20) : size;
                const left = Math.random() * 100;
                const startTop = -8 - Math.random() * 15;
                const delay = Math.random() * 0.8;
                const duration = 2 + Math.random() * 2.5;
                const swayDuration = 1.5 + Math.random() * 1.5;

                piece.style.cssText = `
                    left: ${left}%;
                    top: ${startTop}%;
                    width: ${size}px;
                    height: ${height}px;
                    background: ${color};
                    border-radius: ${isLong ? '3px' : (Math.random() > 0.5 ? '50%' : '3px')};
                    animation: confettiFall ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${delay}s forwards,
                              confettiSway ${swayDuration}s ease-in-out ${delay}s infinite;
                    transform: rotate(${Math.random() * 360}deg);
                    opacity: 0.95;
                `;
                container.appendChild(piece);
            }

            // 6.5秒后清理
            setTimeout(() => { container.innerHTML = ''; }, 6500);
        }

        // 光环爆发效果
        function launchRingBurst() {
            const displayArea = document.getElementById('displayArea');
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const ring = document.createElement('div');
                    ring.className = 'ring-burst';
                    ring.style.animationDelay = `${i * 0.15}s`;
                    displayArea.appendChild(ring);
                    setTimeout(() => ring.remove(), 1000);
                }, i * 150);
            }
        }

        // ===== Toast =====
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== 登出 =====
        async function doLogout() {
            await sb.auth.signOut();
            location.href = 'index.html';
        }

        // ===== 初始化 =====
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { location.href = 'index.html'; return; }
            currentUser = session.user;
            document.getElementById('navUser').textContent = currentUser.email;
            await loadClassOptions();
        })();

        async function loadClassOptions() {
            const { data } = await sb.from('classes')
                .select('id, name').eq('user_id', currentUser.id)
                .order('created_at', { ascending: true });
            const sel = document.getElementById('classSelect');
            (data || []).forEach(c => {
                const o = document.createElement('option');
                o.value = c.id; o.textContent = c.name;
                sel.appendChild(o);
            });
        }

        // ===== 班级切换：从 Supabase 加载学生数据 =====
        async function onClassChange() {
            const classId = document.getElementById('classSelect').value;

            if (!classId) {
                names = []; studentIds = []; absentIds = new Set();
                calledNames = new Set(); history = [];
                lastSelectedName = '';
                document.getElementById('startBtn').disabled = true;
                document.getElementById('startBtn').textContent = '选择班级后开始';
                document.getElementById('easterBtn').disabled = true;
                document.getElementById('displayName').innerHTML = '<span class="display-placeholder">请先选择班级</span>';
                document.getElementById('displayCount').textContent = '请选择班级后开始点名';
                document.getElementById('displayArea').className = 'roll-call-display';
                renderStudentChips();
                renderHistory();
                updateCounts();
                return;
            }

            // 从 Supabase 加载学生
            const { data } = await sb.from('students')
                .select('id, name').eq('class_id', classId)
                .order('created_at', { ascending: true });

            names = (data || []).map(s => s.name);
            studentIds = (data || []).map(s => s.id);
            absentIds = new Set();
            calledNames = new Set();
            history = [];
            lastSelectedName = '';

            if (names.length === 0) {
                showToast('该班级暂无学生，请先去「班级管理」添加', 'error');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('startBtn').textContent = '暂无学生';
                document.getElementById('easterBtn').disabled = true;
                document.getElementById('displayName').innerHTML = '<span class="display-placeholder">该班级暂无学生</span>';
                document.getElementById('displayCount').textContent = '请先添加学生';
            } else {
                document.getElementById('startBtn').disabled = false;
                document.getElementById('startBtn').textContent = '开始点名';
                document.getElementById('displayName').innerHTML = '<span class="display-placeholder">可以开始点名啦！</span>';
                document.getElementById('displayCount').textContent = `当前名单人数：${names.length} | 已点名：0`;
            }

            document.getElementById('displayArea').className = 'roll-call-display';
            renderStudentChips();
            renderHistory();
            updateCounts();
            showToast(`已加载「${document.getElementById('classSelect').selectedOptions[0].textContent}」，共 ${names.length} 人`, 'success');
        }

        // ===== 名单管理 - 学生芯片（支持缺席标记） =====
        function renderStudentChips() {
            const row = document.getElementById('studentChipRow');
            const hint = document.getElementById('emptyHint');
            const badge = document.getElementById('nameCountBadge');

            badge.textContent = `${names.length}人`;

            if (names.length === 0) {
                row.innerHTML = '';
                hint.style.display = 'block';
                return;
            }

            hint.style.display = 'none';
            row.innerHTML = names.map((name, i) => {
                const sid = studentIds[i];
                const isAbsent = absentIds.has(sid);
                const isCalled = calledNames.has(name);
                let cls = 'student-chip';
                if (isAbsent) cls += ' absent';
                if (isCalled) cls += ' called';
                const title = isAbsent ? '点击恢复' : '点击标记缺席（不影响后台数据）';
                return `<div class="${cls}" onclick="toggleAbsent('${sid}')" title="${title}">
                    ${escHtml(name)}${isAbsent ? ' ✗' : ''}
                </div>`;
            }).join('');
        }

        function toggleAbsent(id) {
            if (absentIds.has(id)) {
                absentIds.delete(id);
            } else {
                absentIds.add(id);
            }
            renderStudentChips();
            updateCounts();
        }

        // ===== 渲染历史 =====
        function renderHistory() {
            const list = document.getElementById('historyList');
            const hint = document.getElementById('historyEmptyHint');

            if (history.length === 0) {
                list.innerHTML = '';
                hint.style.display = 'block';
                return;
            }

            hint.style.display = 'none';
            list.innerHTML = history.map((item, i) => `
                <li>
                    <span class="history-index">#${i + 1}</span>
                    <span class="history-name">${escHtml(item.name)}</span>
                    <span class="history-time">${item.time}</span>
                </li>
            `).join('');
        }

        function updateCounts() {
            const total = names.length;
            const called = calledNames.size;
            const activeTotal = names.filter((_, i) => !absentIds.has(studentIds[i])).length;
            const activeCalled = Array.from(calledNames).filter(n => {
                const idx = names.indexOf(n);
                return idx >= 0 && !absentIds.has(studentIds[idx]);
            }).length;

            document.getElementById('displayCount').textContent =
                total > 0
                    ? `当前名单人数：${activeTotal}（共${total}人） | 已点名：${activeCalled}`
                    : '请先选择班级';

            document.getElementById('nameCountBadge').textContent = `${total}人`;
            document.getElementById('historyCountBadge').textContent = `${history.length}次`;

            // 有名单且未点名时，更新提示文字
            const display = document.getElementById('displayName');
            const placeholder = display.querySelector('.display-placeholder');
            if (total > 0 && placeholder && !display.classList.contains('selected') && !display.classList.contains('rolling')) {
                display.innerHTML = '<span class="display-placeholder">可以开始点名啦！</span>';
            }

            const startBtn = document.getElementById('startBtn');
            if (total === 0) {
                startBtn.disabled = true;
                startBtn.textContent = '暂无学生';
            } else {
                const noRepeat = document.getElementById('noRepeat').checked;
                const available = getAvailable();
                startBtn.disabled = noRepeat && available.length === 0;
                if (startBtn.disabled) {
                    startBtn.textContent = '全部点完';
                } else {
                    startBtn.textContent = '开始点名';
                }
            }
        }

        // ===== 获取可点名列表 =====
        function getAvailable() {
            return names.filter((name, i) => {
                const noRepeat = document.getElementById('noRepeat').checked;
                if (absentIds.has(studentIds[i])) return false;
                if (noRepeat && calledNames.has(name)) return false;
                return true;
            });
        }

        // ===== 重置点名 =====
        function resetCalledStatus() {
            calledNames.clear();
            history = [];
            lastSelectedName = '';
            document.getElementById('easterBtn').disabled = true;
            renderStudentChips();
            renderHistory();
            updateCounts();
            document.getElementById('displayName').innerHTML = '<span class="display-placeholder">可以开始点名啦！</span>';
            document.getElementById('displayArea').className = 'roll-call-display';
            showToast('已重置点名状态', 'success');
        }

        // ===== 点名核心逻辑 =====
        function startRollCall() {
            if (isRolling) {
                stopRollCall();
                return;
            }

            const available = getAvailable();

            if (available.length === 0) {
                showToast('所有人都已点名完毕！', 'info');
                return;
            }

            isRolling = true;
            const display = document.getElementById('displayName');
            const displayArea = document.getElementById('displayArea');
            const startBtn = document.getElementById('startBtn');

            // 清除上一次选中状态
            display.classList.remove('selected');
            displayArea.classList.remove('result');
            display.style.fontSize = '';

            startBtn.textContent = '停止';
            startBtn.classList.add('rolling-btn');
            displayArea.classList.add('active');
            display.classList.add('rolling');

            const duration = parseInt(document.getElementById('rollDuration').value) || 5;
            const startTime = Date.now();
            const totalDuration = duration * 1000;

            // 滚动动画 - 逐渐减速
            function rollStep() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / totalDuration, 1);

                // 动态调整间隔：从50ms加速到200ms（越接近结束越慢）
                const currentInterval = 50 + progress * progress * 200;

                const randomName = available[Math.floor(Math.random() * available.length)];
                display.textContent = randomName;
                playTickSound();

                if (elapsed >= totalDuration) {
                    stopRollCall();
                    return;
                }

                rollInterval = setTimeout(rollStep, currentInterval);
            }

            rollStep();
        }

        function stopRollCall() {
            isRolling = false;
            clearTimeout(rollInterval);
            rollInterval = null;

            const display = document.getElementById('displayName');
            const displayArea = document.getElementById('displayArea');
            const startBtn = document.getElementById('startBtn');
            const available = getAvailable();

            startBtn.textContent = '开始点名';
            startBtn.classList.remove('rolling-btn');
            display.classList.remove('rolling');

            if (available.length === 0) {
                display.innerHTML = '<span class="display-placeholder">全部点完！</span>';
                displayArea.classList.remove('active');
                displayArea.classList.add('result');
                showToast('所有人都已点名完毕！', 'info');
                updateCounts();
                return;
            }

            // 最终选定
            const selectedName = available[Math.floor(Math.random() * available.length)];
            display.textContent = selectedName;
            display.classList.add('selected');
            displayArea.classList.remove('active');
            displayArea.classList.add('result');

            // 触发炫酷动效
            launchConfetti();
            launchRingBurst();
            playResultSound();

            // 记录选中名字并激活彩蛋按钮
            lastSelectedName = selectedName;
            document.getElementById('easterBtn').disabled = false;

            calledNames.add(selectedName);
            history.push({
                name: selectedName,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
            });

            // 保存记录到 Supabase
            saveRecordToSupabase(selectedName);

            renderStudentChips();
            renderHistory();
            updateCounts();
        }

        async function saveRecordToSupabase(name) {
            const classId = document.getElementById('classSelect').value;
            const idx = names.indexOf(name);
            const studentId = idx >= 0 ? studentIds[idx] : null;

            if (!classId || !studentId) return;

            await sb.from('roll_records').insert({
                class_id: classId,
                student_id: studentId,
                student_name: name,
                user_id: currentUser.id,
                rolled_at: new Date().toISOString()
            });
        }

        // ===== 彩蛋功能 =====
        const easterEggItems = [
            { text: '说一句雷老师真帅，不用回答问题！', icon: '😎', type: 'lucky' },
            { text: '如果你是女生，不用回答！', icon: '👧', type: 'lucky' },
            { text: '如果你是男生，不用回答！', icon: '👦', type: 'lucky' },
            { text: '运气爆棚，必须回答这个问题！', icon: '💥', type: 'unlucky' }
        ];

        function triggerEasterEgg() {
            if (!lastSelectedName) {
                showToast('请先点名再开彩蛋哦~', 'info');
                return;
            }
            const item = easterEggItems[Math.floor(Math.random() * easterEggItems.length)];
            showEasterModal(item);
        }

        function showEasterModal(item) {
            // 移除已有弹窗
            const existing = document.getElementById('easterModalOverlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.className = 'easter-modal-overlay';
            overlay.id = 'easterModalOverlay';
            overlay.onclick = function(e) { if (e.target === overlay) closeEasterModal(); };

            const typeColor = item.type === 'lucky' ? '#10b981' : '#ef4444';
            const typeLabel = item.type === 'lucky' ? '幸运' : '挑战';

            overlay.innerHTML = `
                <div class="easter-modal">
                    <div class="easter-icon">${item.icon}</div>
                    <div class="easter-title" style="color: ${typeColor}">${typeLabel}彩蛋</div>
                    <div class="easter-person"> ⭐${escHtml(lastSelectedName)}⭐</div>
                    <div class="easter-content">${item.text}</div>
                    <div class="easter-actions">
                        <button class="easter-btn easter-btn-close" onclick="closeEasterModal()">知道了</button>
                        <button class="easter-btn easter-btn-again" onclick="rerollEasterEgg()">再抽一次</button>
                    </div>
                </div>
            `;

            document.body.appendChild(overlay);
            playEasterEggSound(item.type);
        }

        function closeEasterModal() {
            const overlay = document.getElementById('easterModalOverlay');
            if (overlay) overlay.remove();
        }

        function rerollEasterEgg() {
            const item = easterEggItems[Math.floor(Math.random() * easterEggItems.length)];
            closeEasterModal();
            setTimeout(() => showEasterModal(item), 200);
        }

        // ===== 工具函数 =====
        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // ===== 键盘快捷键 =====
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                const btn = document.getElementById('startBtn');
                if (!btn.disabled) startRollCall();
            }
        });

        // 监听选项变化
        document.getElementById('noRepeat').addEventListener('change', updateCounts);

        // 初始状态
        updateCounts();
    </script>
</body>
</html>
